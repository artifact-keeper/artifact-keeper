name: ak-fix2504-s3

services:
  postgres:
    image: postgres:16-alpine
    container_name: ak-2504s3-db
    environment:
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry
      POSTGRES_DB: artifact_registry
    ports: ["127.0.0.1:30602:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry -d artifact_registry"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [s3net]

  minio:
    image: minio/minio:latest
    container_name: ak-2504s3-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [s3net]

  createbucket:
    image: minio/mc:latest
    container_name: ak-2504s3-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/ak-artifacts &&
      echo bucket-ready
      "
    networks: [s3net]

  backend:
    image: artifact-keeper-backend:fix-2504
    container_name: ak-2504s3-backend
    depends_on:
      postgres:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://registry:registry@postgres:5432/artifact_registry
      STORAGE_PATH: /data/storage
      BACKUP_PATH: /data/backups
      PLUGINS_DIR: /data/plugins
      JWT_SECRET: fix2504-nonprod-cobalt-harbor-lantern-5521
      ADMIN_PASSWORD: TestRunner!2026secure
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: "8080"
      STORAGE_BACKEND: s3
      S3_BUCKET: ak-artifacts
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      RATE_LIMIT_ENABLED: "false"
    ports:
      - "127.0.0.1:8082:8080"
      - "127.0.0.1:9092:9090"
    volumes:
      - s3_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 10s
      start_period: 40s
      retries: 24
    networks: [s3net]

networks:
  s3net:
    name: ak-2504s3-net

volumes:
  s3_data:
