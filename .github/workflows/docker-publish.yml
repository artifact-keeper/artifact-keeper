name: Docker Publish

on:
  push:
    branches: [main, master, 'release/1.1.x']
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - '.beads/**'
      - 'LICENSE'
      - 'CLAUDE.md'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Candidate image tag (e.g., rc-1.5.9, pr-123, 1.1-dev). Release-managed labels such as latest/dev/stable and version numbers are refused.'
        required: true
        default: 'rc-candidate'

permissions: {}

# Concurrency rules:
#
# - The group is keyed by `event_name` + `ref` so push and workflow_dispatch
#   for the same branch are in DIFFERENT groups. A manual run (`workflow_dispatch`)
#   never gets cancelled by an auto run, and vice versa.
# - `cancel-in-progress` is true ONLY for branch pushes (not tag pushes,
#   not workflow_dispatch). When a new commit lands on main while an
#   earlier auto-build is still running, the older one is cancelled so we
#   stop building stale containers.
# - Tag pushes (releases) and manual dispatches always run to completion.
concurrency:
  group: docker-publish-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}-backend
  OPENSCAP_IMAGE: ${{ github.repository }}-openscap
  SCANNER_ADAPTER_IMAGE: ${{ github.repository }}-scanner-adapter
  DOCKERHUB_BACKEND: artifactkeeper/backend
  DOCKERHUB_OPENSCAP: artifactkeeper/openscap
  DOCKERHUB_SCANNER_ADAPTER: artifactkeeper/scanner-adapter

jobs:
  publish-preflight:
    name: Publish identity preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # The validated, normalized manual tag. Downstream metadata steps use
      # THIS value rather than the raw input, so the string that was checked is
      # the string that gets published. Empty for non-dispatch events, where
      # the manual tag line is disabled anyway.
      dispatch_tag: ${{ steps.manual_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/scripts

      # Scope, stated honestly: `created` is false only when a push updates an
      # existing ref, so this catches a force-push over a live tag -- the
      # v1.5.8 failure mode. It does NOT catch delete-then-recreate: GitHub
      # reports the recreating push as a brand-new ref (created=true,
      # forced=false), indistinguishable from a first-time tag. `deleted` is
      # not checked because Actions does not run `push` workflows on ref
      # deletion at all, so the branch would be dead code.
      #
      # Genuine tag immutability is a repository ruleset (restrict updates AND
      # deletions on refs/tags/v*), not a workflow control. This job narrows
      # the window; it does not close it.
      - name: Reject moved version tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_CREATED: ${{ github.event.created }}
          TAG_FORCED: ${{ github.event.forced }}
        run: |
          set -euo pipefail
          if [[ "$TAG_CREATED" != "true" || "$TAG_FORCED" == "true" ]]; then
            echo "::error title=Version tag is not new::${GITHUB_REF_NAME} was moved or force-pushed. Refusing to replace published container tags; create a new version instead."
            exit 1
          fi

      # Manual builds are useful for candidate/dev labels, but must not be a
      # back door around the guarded release path. See the script for why the
      # normalized value is what gets validated and published.
      - name: Validate manual tag
        id: manual_tag
        if: github.event_name == 'workflow_dispatch'
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG=$(.github/scripts/validate-dispatch-tag.sh "$REQUESTED_TAG")
          echo "Manual tag accepted: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-backend:
    name: Backend (${{ matrix.platform }})
    needs: [publish-preflight]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ak-ci-runners
            cache-tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-tag: arm64
    outputs:
      digest-amd64: ${{ steps.build.outputs.digest }}
      digest-arm64: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticate to Docker Hub before buildx so transitive `FROM`
      # statements that pull from docker.io (e.g., the alpine:3.23 stage
      # used to pre-seed the Grype CVE DB inside Dockerfile.backend) are
      # not subject to the 100-pull/6h anonymous rate limit.
      - name: Log in to Docker Hub (for transitive base-image pulls)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile.backend
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Registry cache instead of type=gha: buildkit blobs were consuming
          # ~7.7GB of the repo's 10GB Actions cache quota, evicting the rust
          # caches daily. image-manifest+oci-mediatypes are required for GHCR
          # to accept mode=max cache manifests.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:buildcache-${{ matrix.cache-tag }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:buildcache-${{ matrix.cache-tag }},mode=max,image-manifest=true,oci-mediatypes=true
          # Always re-run the package-refresh and runtime stages: their RUN
          # lines (`dnf upgrade`, `grype db update`) are only correct when
          # executed against the CURRENT repos, but the registry cache would
          # otherwise happily serve months-old layers, shipping stale security
          # errata and a stale grype DB (#2391). The expensive Rust stages
          # (planner/deps/builder) stay fully cached.
          no-cache-filters: rootfs-builder,grype-db-seed,runtime
          sbom: true
          provenance: mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: backend-digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-openscap:
    name: OpenSCAP (${{ matrix.platform }})
    needs: [publish-preflight]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ak-ci-runners
            cache-tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-tag: arm64
    outputs:
      digest-amd64: ${{ steps.build.outputs.digest }}
      digest-arm64: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticate to Docker Hub for transitive base-image pulls; see
      # the matching step in build-backend for rationale.
      - name: Log in to Docker Hub (for transitive base-image pulls)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OPENSCAP_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile.openscap
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.OPENSCAP_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OPENSCAP_IMAGE }}:buildcache-${{ matrix.cache-tag }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OPENSCAP_IMAGE }}:buildcache-${{ matrix.cache-tag }},mode=max,image-manifest=true,oci-mediatypes=true
          # Re-run the dnf package-refresh stage against current errata on
          # every publish instead of serving it from stale cache (#2391).
          no-cache-filters: rootfs-builder
          sbom: true
          provenance: mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openscap-digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-scanner-adapter:
    name: Scanner Adapter (${{ matrix.platform }})
    needs: [publish-preflight]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ak-ci-runners
            cache-tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-tag: arm64
    outputs:
      digest-amd64: ${{ steps.build.outputs.digest }}
      digest-arm64: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticate to Docker Hub for transitive base-image pulls; see
      # the matching step in build-backend for rationale.
      - name: Log in to Docker Hub (for transitive base-image pulls)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.SCANNER_ADAPTER_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile.scanner-adapter
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.SCANNER_ADAPTER_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.SCANNER_ADAPTER_IMAGE }}:buildcache-${{ matrix.cache-tag }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.SCANNER_ADAPTER_IMAGE }}:buildcache-${{ matrix.cache-tag }},mode=max,image-manifest=true,oci-mediatypes=true
          # Re-run the runtime stage (`apk add --no-cache`) against current
          # Alpine errata on every publish instead of serving it from stale
          # cache (#2391). The Go build stage stays cached.
          no-cache-filters: runtime
          sbom: true
          provenance: mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scanner-adapter-digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-backend-alpine:
    name: Backend Alpine (${{ matrix.platform }})
    needs: [publish-preflight]
    # Alpine builds suspended. UBI is the default backend image and the
    # only one we currently publish. Re-enable when the Alpine variant is
    # needed again (smaller footprint, distroless-style use cases).
    if: false
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ak-ci-runners
            cache-tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-tag: arm64
    outputs:
      digest-amd64: ${{ steps.build.outputs.digest }}
      digest-arm64: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile.backend.alpine
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:buildcache-alpine-${{ matrix.cache-tag }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:buildcache-alpine-${{ matrix.cache-tag }},mode=max,image-manifest=true,oci-mediatypes=true
          # Re-run the package-refresh and runtime stages against current
          # errata on every publish; see the backend job note (#2391).
          no-cache-filters: grype-db-seed,runtime
          sbom: true
          provenance: mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: backend-alpine-digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  scan-containers:
    name: Security Scan
    runs-on: ubuntu-24.04
    # `build-backend-alpine` removed from `needs` while alpine builds are
    # suspended. Re-add it (and re-enable the alpine-gated steps below)
    # when the alpine variant comes back online.
    needs: [build-backend, build-openscap, build-scanner-adapter]
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download backend amd64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: backend-digests-amd64
          path: /tmp/backend-digests

      - name: Download openscap amd64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: openscap-digests-amd64
          path: /tmp/openscap-digests

      - name: Download scanner-adapter amd64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: scanner-adapter-digests-amd64
          path: /tmp/scanner-adapter-digests

      # Alpine digest download skipped while alpine builds are suspended.
      # - name: Download backend alpine amd64 digest
      #   uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      #   with:
      #     name: backend-alpine-digests-amd64
      #     path: /tmp/backend-alpine-digests

      - name: Resolve image references
        id: refs
        run: |
          BACKEND_DIGEST=$(ls /tmp/backend-digests/)
          OPENSCAP_DIGEST=$(ls /tmp/openscap-digests/)
          SCANNER_ADAPTER_DIGEST=$(ls /tmp/scanner-adapter-digests/)
          echo "backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}@sha256:${BACKEND_DIGEST}" >> $GITHUB_OUTPUT
          echo "openscap=${{ env.REGISTRY }}/${{ env.OPENSCAP_IMAGE }}@sha256:${OPENSCAP_DIGEST}" >> $GITHUB_OUTPUT
          echo "scanner-adapter=${{ env.REGISTRY }}/${{ env.SCANNER_ADAPTER_IMAGE }}@sha256:${SCANNER_ADAPTER_DIGEST}" >> $GITHUB_OUTPUT
          # backend-alpine digest output skipped while alpine builds are suspended.

      # --- Trivy CVE scanning ---
      # --ignore-unfixed: only fail on CVEs with available patches.
      # Unpatched UBI base image CVEs (Red Hat's responsibility) are still
      # reported in SARIF for visibility but don't block the build.
      # Trivy scans upload SARIF to GitHub Security tab for visibility.
      # exit-code: 0 means scan results are informational — unfixed base image
      # CVEs (Red Hat's responsibility) should not block image publishing.
      # NOTE: trivy binary extracted from official GHCR image because the
      # aquasecurity/trivy GitHub repo was wiped (no releases/tags).
      - name: Install Trivy
        run: |
          CONTAINER_ID=$(docker create ghcr.io/aquasecurity/trivy:0.69.3)
          docker cp "$CONTAINER_ID:/usr/local/bin/trivy" /usr/local/bin/trivy
          docker rm "$CONTAINER_ID"
          trivy --version

      - name: Trivy scan - Backend
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ steps.refs.outputs.backend }}
          format: 'sarif'
          output: 'backend-trivy.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          # Suppress residual CVEs in the bundled trivy/grype CLI binaries that
          # have no fixed tool release yet (justified per-CVE in .trivyignore).
          trivyignores: '.trivyignore'
          exit-code: '0'
          skip-setup-trivy: true

      - name: Trivy scan - OpenSCAP
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        if: always()
        with:
          image-ref: ${{ steps.refs.outputs.openscap }}
          format: 'sarif'
          output: 'openscap-trivy.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: '0'
          skip-setup-trivy: true

      - name: Trivy scan - Scanner Adapter
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        if: always()
        with:
          image-ref: ${{ steps.refs.outputs.scanner-adapter }}
          format: 'sarif'
          output: 'scanner-adapter-trivy.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: '0'
          skip-setup-trivy: true

      # Alpine scan skipped while alpine builds are suspended.
      - name: Trivy scan - Backend Alpine
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        if: false
        with:
          image-ref: ${{ steps.refs.outputs.backend-alpine }}
          format: 'sarif'
          output: 'backend-alpine-trivy.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: '0'
          skip-setup-trivy: true

      - name: Upload Backend Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: 'backend-trivy.sarif'
          category: 'trivy-backend'

      - name: Upload OpenSCAP Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: 'openscap-trivy.sarif'
          category: 'trivy-openscap'

      - name: Upload Scanner Adapter Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: 'scanner-adapter-trivy.sarif'
          category: 'trivy-scanner-adapter'

      # Alpine SARIF upload skipped while alpine builds are suspended.
      - name: Upload Backend Alpine Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: false
        with:
          sarif_file: 'backend-alpine-trivy.sarif'
          category: 'trivy-backend-alpine'

      - name: Upload Trivy reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: trivy-scan-reports
          path: |
            backend-trivy.sarif
            openscap-trivy.sarif
            scanner-adapter-trivy.sarif
            backend-alpine-trivy.sarif
          retention-days: 90

      # --- OpenSCAP STIG compliance scan ---
      - name: Install OpenSCAP
        if: always()
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openscap-utils rpm2cpio

      - name: Download SCAP Security Guide (RHEL 9 STIG content)
        if: always()
        run: |
          SSG_VERSION=$(curl -sI "https://github.com/ComplianceAsCode/content/releases/latest" | grep -i ^location | sed 's|.*/||' | tr -d '\r')
          curl -sSfL -o /tmp/ssg.zip \
            "https://github.com/ComplianceAsCode/content/releases/download/${SSG_VERSION}/scap-security-guide-${SSG_VERSION#v}.zip"
          mkdir -p /tmp/ssg && unzip -q /tmp/ssg.zip -d /tmp/ssg
          SSG_DS=$(find /tmp/ssg -name "ssg-rhel9-ds.xml" | head -1)
          echo "SSG_DS=${SSG_DS}" >> $GITHUB_ENV

      - name: STIG scan - Backend
        if: always()
        run: |
          docker pull ${{ steps.refs.outputs.backend }}
          CID=$(docker create ${{ steps.refs.outputs.backend }})
          mkdir -p /tmp/rootfs/backend
          docker export ${CID} | tar -xf - -C /tmp/rootfs/backend
          docker rm ${CID}

          oscap xccdf eval \
            --profile xccdf_org.ssgproject.content_profile_stig \
            --results backend-stig-results.xml \
            --report backend-stig-report.html \
            --chroot /tmp/rootfs/backend \
            "${SSG_DS}" || true

      - name: STIG scan - OpenSCAP
        if: always()
        run: |
          docker pull ${{ steps.refs.outputs.openscap }}
          CID=$(docker create ${{ steps.refs.outputs.openscap }})
          mkdir -p /tmp/rootfs/openscap
          docker export ${CID} | tar -xf - -C /tmp/rootfs/openscap
          docker rm ${CID}

          oscap xccdf eval \
            --profile xccdf_org.ssgproject.content_profile_stig \
            --results openscap-stig-results.xml \
            --report openscap-stig-report.html \
            --chroot /tmp/rootfs/openscap \
            "${SSG_DS}" || true

      - name: Upload STIG reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: stig-compliance-reports
          path: |
            *-stig-report.html
            *-stig-results.xml
          retention-days: 90

      - name: STIG compliance summary
        if: always()
        run: |
          echo "## Container Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trivy CVE Scan" >> $GITHUB_STEP_SUMMARY
          # These scans run with `exit-code: 0`: they report, they do not gate.
          # Findings land in code scanning and in the uploaded SARIF. Saying
          # otherwise here would be the same kind of unearned claim this
          # workflow's other guards exist to remove. Making the policy real is
          # tracked separately.
          echo "- **Scope**: CRITICAL and HIGH severity, fixed CVEs only (\`.trivyignore\` documents accepted exceptions)" >> $GITHUB_STEP_SUMMARY
          echo "- **Policy**: reporting only — findings are uploaded to code scanning and do NOT block publication" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: $([ -f backend-trivy.sarif ] && echo 'Scanned' || echo 'Skipped')" >> $GITHUB_STEP_SUMMARY
          echo "- **OpenSCAP**: $([ -f openscap-trivy.sarif ] && echo 'Scanned' || echo 'Skipped')" >> $GITHUB_STEP_SUMMARY
          echo "- **Scanner Adapter**: $([ -f scanner-adapter-trivy.sarif ] && echo 'Scanned' || echo 'Skipped')" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Alpine**: $([ -f backend-alpine-trivy.sarif ] && echo 'Scanned' || echo 'Skipped')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### OpenSCAP STIG Compliance" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile**: DISA STIG for RHEL 9" >> $GITHUB_STEP_SUMMARY
          echo "- HTML reports uploaded as workflow artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Alpine CVE Comparison" >> $GITHUB_STEP_SUMMARY
          echo "- No STIG scan for Alpine variant (no applicable DISA STIG profile)" >> $GITHUB_STEP_SUMMARY
          echo "- Compare Trivy SARIF results between UBI and Alpine for CVE delta" >> $GITHUB_STEP_SUMMARY

  merge-backend:
    name: Backend Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [publish-preflight, build-backend]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout (scripts and VEX files)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/scripts
            .vex

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: backend-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # The exact version tag is the identity the Helm chart pins, so it is
      # published once and never re-pointed -- not by a rerun, and not by a
      # delete-and-recreate of the git tag, which the preflight cannot detect
      # (only a repository ruleset can). Both registries are checked because
      # this run writes to both, and a tag that survives on one is not evidence
      # about the other. The floating tags (latest, X.Y) are expected to move
      # and are not checked here.
      - name: Refuse to overwrite a published backend version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          .github/scripts/assert-stable-tag-free.sh "$VERSION" \
            "ghcr.io|${BACKEND_IMAGE}" \
            "docker.io|${DOCKERHUB_BACKEND}"

      - name: Extract metadata (ghcr.io)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=1.1-dev,enable=${{ github.ref == format('refs/heads/{0}', 'release/1.1.x') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=raw,value=${{ needs.publish-preflight.outputs.dispatch_tag }},enable=${{ github.event_name == 'workflow_dispatch' && needs.publish-preflight.outputs.dispatch_tag != '' }}

      - name: Extract metadata (Docker Hub)
        id: meta-dockerhub
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: docker.io/${{ env.DOCKERHUB_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=dev,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=1.1-dev,enable=${{ github.ref == format('refs/heads/{0}', 'release/1.1.x') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=raw,value=${{ needs.publish-preflight.outputs.dispatch_tag }},enable=${{ github.event_name == 'workflow_dispatch' && needs.publish-preflight.outputs.dispatch_tag != '' }}

      - name: Create manifest list and push (ghcr.io)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

      - name: Inspect image
        id: inspect
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          DIGEST=$(docker buildx imagetools inspect --format '{{json .Manifest}}' \
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }} | jq -r '.digest')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Copy to Docker Hub
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta-dockerhub.outputs.json }}') \
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}@${{ steps.inspect.outputs.digest }}

      - name: Sign image with cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}@${{ steps.inspect.outputs.digest }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          subject-digest: ${{ steps.inspect.outputs.digest }}
          push-to-registry: true
        continue-on-error: true

      # .vex was fetched by the checkout at the top of this job.
      - name: Attach VEX attestations
        run: |
          for vex in .vex/*.vex.json; do
            [ -f "$vex" ] || continue
            echo "Attaching VEX: $vex"
            docker scout attestation add \
              --file "$vex" \
              --predicate-type https://openvex.dev/ns/v0.2.0 \
              ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}@${{ steps.inspect.outputs.digest }}
          done
        continue-on-error: true

