name: Release

# A tag push is the only way to cut a release. There was also a
# `workflow_dispatch` trigger taking a free-text `version` input, which has been
# removed: it let the version being released drift away from the ref being
# tested. The gates read `github.ref` (CHANGELOG, image probes) while the
# release action read `inputs.version`, so a dispatch could validate one version
# and publish a different one from whatever the default branch happened to be at
# the time. It had no user -- releases are cut by pushing a tag, per RELEASING.md
# -- so the coherent fix is to delete it rather than to reconcile it.
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  actions: write

# One release run per tag, and never cancel one. Two runs for the same tag would
# both pass the preflight and then race to publish, and the winner decides which
# commit the public release contains.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-preflight:
    name: Release identity preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/scripts

      # Scope, stated honestly: `created` is false only when a push updates an
      # existing ref, so this catches a force-push over a live tag -- the
      # v1.5.8 failure mode, where one version named two commits. It does NOT
      # catch delete-then-recreate: GitHub reports the recreating push as a
      # brand-new ref (created=true, forced=false), indistinguishable from a
      # first-time tag. `deleted` is not checked because Actions does not run
      # `push` workflows on ref deletion at all.
      #
      # Real tag immutability comes from a repository ruleset restricting
      # updates AND deletions on refs/tags/v* -- a repository setting an
      # administrator applies, which no workflow can substitute for. This job
      # narrows the window; it does not close it.
      - name: Reject moved version tags
        env:
          TAG_CREATED: ${{ github.event.created }}
          TAG_FORCED: ${{ github.event.forced }}
        run: |
          set -euo pipefail
          if [[ "$TAG_CREATED" != "true" || "$TAG_FORCED" == "true" ]]; then
            echo "::error title=Version tag is not new::${GITHUB_REF_NAME} was moved or force-pushed. Released version tags are immutable; create a new version instead."
            exit 1
          fi

      # Catches a published release early, before an hour of gates. It cannot
      # see drafts -- see the script, and the repeat of this check in the
      # release job, which holds the token that can.
      - name: Refuse an existing GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          .github/scripts/assert-release-absent.sh "${GITHUB_REF_NAME}"

  # ════════════════════════════════════════════════════════════════════════════
  # E2E GATE - Must pass before release proceeds
  # ════════════════════════════════════════════════════════════════════════════

  e2e-gate:
    name: 🚦 E2E Gate
    needs: [release-preflight]
    uses: ./.github/workflows/e2e.yml
    with:
      profile: smoke
      include_stress: false
      include_failure: false

  mesh-e2e-gate:
    name: Mesh Replication E2E (optional)
    needs: [release-preflight]
    uses: ./.github/workflows/mesh-e2e.yml
    with:
      image_tag: dev
    secrets: inherit

  release-gate:
    name: Release Gate (Full Suite)
    needs: [release-preflight]
    uses: artifact-keeper/artifact-keeper-test/.github/workflows/release-gate.yml@main
    with:
      backend_tag: dev
      test_suite: all
    secrets: inherit

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD BINARIES
  # ════════════════════════════════════════════════════════════════════════════

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Both gates must be green. That is the default `success()` behaviour for
    # `needs`, so no `if:` is needed -- and an `always()` here would only be a
    # way to lose it again.
    needs: [e2e-gate, release-gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: artifact-keeper-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: artifact-keeper-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: artifact-keeper-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: artifact-keeper-darwin-arm64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: artifact-keeper-windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler pkg-config libssl-dev

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Windows cross-compilation tools
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get install -y mingw-w64

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Setting workspace version to ${VERSION}"
          # Portable in-place edit: GNU `sed -i` and BSD/macOS `sed -i` take
          # incompatible arguments (BSD requires a backup suffix), which broke
          # the macOS release builds (#1538: "sed: 1: Cargo.toml: invalid
          # command code C"). Use a temp file so the same step works on the
          # Linux and macOS runners alike.
          sed "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml > Cargo.toml.tmp
          mv Cargo.toml.tmp Cargo.toml
          head -5 Cargo.toml

      - name: Build
        env:
          SQLX_OFFLINE: true
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: cargo build --release --target ${{ matrix.target }} --features vendored-openssl

      - name: Package binary (Unix)
        if: "!contains(matrix.target, 'windows')"
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/artifact-keeper dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}
          cd dist
          tar -czvf ${{ matrix.name }}.tar.gz ${{ matrix.name }}
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256
          fi

      - name: Package binary (Windows)
        if: contains(matrix.target, 'windows')
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/artifact-keeper.exe dist/${{ matrix.name }}.exe
          cd dist
          sha256sum ${{ matrix.name }}.exe > ${{ matrix.name }}.exe.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}.tar.gz*
            dist/${{ matrix.name }}.exe*

  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY REQUIRED IMAGES PUBLISHED ON GHCR.IO
  #
  # Cross-repo image-publish gate. v1.1.8 shipped with no
  # ghcr.io/.../artifact-keeper-web:1.1.8 published, breaking every fresh
  # helm install. This job polls ghcr.io for every image the chart
  # references at the release version tag, and fails if any is missing
  # after the docker-publish workflows have had time to complete.
  #
  # When this gate fails, the GitHub Release job does not run.
  #
  # Tracks Hardening Core issue
  # https://github.com/artifact-keeper/artifact-keeper/issues/882
  # ════════════════════════════════════════════════════════════════════════════

  verify-images-published:
    name: 🐳 Verify Required Images Published
    runs-on: ubuntu-latest
    permissions:
      packages: read
    # Runs on a green build-binaries by default. The old `startsWith(github.ref,
    # 'refs/tags/v')` guard existed for the removed workflow_dispatch trigger,
    # where it quietly skipped this job -- and a skipped required gate then
    # skipped the release itself after an hour of work, with nothing red to
    # explain why. The workflow only triggers on v-tags now.
    needs: [build-binaries]
    timeout-minutes: 35
    steps:
      - name: Checkout tag (for CHANGELOG verification)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── CHANGELOG documents the release ─────────────────────────────
      # Release policy: every final release vX.Y.Z must carry a
      # non-empty `## [X.Y.Z]` section in CHANGELOG.md (promote the
      # [Unreleased] section before tagging; see RELEASING.md). This
      # runs before the image polling so a missing entry fails in
      # seconds instead of after the 30-minute image wait. Prerelease
      # tags (contain '-') are exempt. The same rule is enforced by the
      # version-set-integrity job in the artifact-keeper-test release
      # gate when it is dispatched with a release version tag.
      - name: Verify CHANGELOG.md documents this release
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${VERSION} is not a final release version (X.Y.Z); CHANGELOG check skipped."
            exit 0
          fi
          ver_esc="${VERSION//./\\.}"
          if ! grep -qE "^## \[${ver_esc}\]" CHANGELOG.md; then
            echo "::error title=CHANGELOG entry missing::CHANGELOG.md has no entry for ${VERSION} -- promote [Unreleased] to a '## [${VERSION}] - <date>' section before tagging. The release stays a DRAFT until the entry exists and the tag is re-cut."
            exit 1
          fi
          content_lines=$(awk -v ver="${VERSION}" '
            BEGIN { esc = ver; gsub(/\./, "\\.", esc); pat = "^## \\[" esc "\\]" }
            $0 ~ pat { insec = 1; next }
            insec && /^## /  { exit }
            insec && NF > 0  { n++ }
            END { print n + 0 }
          ' CHANGELOG.md)
          if [ "${content_lines}" -eq 0 ]; then
            echo "::error title=CHANGELOG entry empty::CHANGELOG.md has a '## [${VERSION}]' heading but no content under it -- fill in the release notes before tagging."
            exit 1
          fi
          echo "CHANGELOG.md documents ${VERSION} (${content_lines} content lines). OK."

      - name: Wait for and verify required images on ghcr.io and docker.io
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -u
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Verifying required images for version: ${VERSION}"
          echo "Both registries (ghcr.io and docker.io) must have every image."

          # Poll both registries for up to 30 minutes per image. Multi-arch
          # builds, cosign signing and provenance attestation routinely take
          # 15-25 minutes, so we wait rather than fail-fast.
          DEADLINE=$(($(date +%s) + 30*60))

          # Required image set. Each entry is "<registry>|<name>:<tag>".
          # ghcr.io uses the artifact-keeper org / hyphenated names.
          # docker.io uses the artifactkeeper namespace / shorter names.
          # Missing on EITHER registry blocks the release.
          # The `-alpine` backend variant is currently suspended (its
          # build/merge jobs in docker-publish.yml are gated `if: false`), so
          # it is intentionally omitted — re-add the two `${VERSION}-alpine`
          # entries when that variant is published again.
          IMAGES=(
            "ghcr.io|artifact-keeper/artifact-keeper-backend:${VERSION}"
            "ghcr.io|artifact-keeper/artifact-keeper-openscap:${VERSION}"
            "ghcr.io|artifact-keeper/artifact-keeper-web:${VERSION}"
            # scanner-adapter has its own independent semver (see
            # docker/scanner-adapter/VERSION); the chart pins its MAJOR, so the
            # release verifies the adapter's major tag (currently 1) rather than
            # the AK release ${VERSION}, which no adapter tag would match.
            "ghcr.io|artifact-keeper/artifact-keeper-scanner-adapter:1"
            "docker.io|artifactkeeper/backend:${VERSION}"
            "docker.io|artifactkeeper/openscap:${VERSION}"
            "docker.io|artifactkeeper/web:${VERSION}"
            "docker.io|artifactkeeper/scanner-adapter:1"
          )

          # Common Accept headers cover OCI index, Docker manifest list,
          # and Docker manifest v2 (different registries return different
          # default media types).
          MANIFEST_ACCEPT='-H Accept:application/vnd.oci.image.index.v1+json -H Accept:application/vnd.docker.distribution.manifest.list.v2+json -H Accept:application/vnd.docker.distribution.manifest.v2+json'

          probe_ghcr() {
            local name="$1"; local tag="$2"
            local token
            token=$(curl -sf "https://ghcr.io/token?service=ghcr.io&scope=repository:${name}:pull" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              | jq -r '.token // empty')
            [ -n "${token}" ] || return 1
            # shellcheck disable=SC2086
            # --proto =https refuses to follow HTTPS->HTTP redirects so the
            # Bearer token can never leak over plaintext.
            curl -sfL --proto =https -o /dev/null \
              -H "Authorization: Bearer ${token}" \
              ${MANIFEST_ACCEPT} \
              "https://ghcr.io/v2/${name}/manifests/${tag}"
          }

          probe_dockerhub() {
            local name="$1"; local tag="$2"
            # Docker Hub anonymous token (works for public repos).
            local token
            token=$(curl -sf "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${name}:pull" \
              | jq -r '.token // empty')
            [ -n "${token}" ] || return 1
            # shellcheck disable=SC2086
            # --proto =https refuses to follow HTTPS->HTTP redirects so the
            # Bearer token can never leak over plaintext.
            curl -sfL --proto =https -o /dev/null \
              -H "Authorization: Bearer ${token}" \
              ${MANIFEST_ACCEPT} \
              "https://registry-1.docker.io/v2/${name}/manifests/${tag}"
          }

          probe() {
            local registry="$1"; local img="$2"
            local name="${img%:*}"; local tag="${img#*:}"
            case "${registry}" in
              ghcr.io)   probe_ghcr "${name}" "${tag}" ;;
              docker.io) probe_dockerhub "${name}" "${tag}" ;;
              *) echo "::error::unknown registry ${registry}"; return 2 ;;
            esac
          }

          missing=()
          for entry in "${IMAGES[@]}"; do
            registry="${entry%%|*}"
            img="${entry#*|}"
            echo ""
            echo "Polling ${registry}/${img}"
            while true; do
              if probe "${registry}" "${img}"; then
                echo "  ✓ ${registry}/${img}"
                break
              fi
              if [ "$(date +%s)" -ge "${DEADLINE}" ]; then
                echo "::error::Required image missing on ${registry} after 30m: ${img}"
                missing+=("${registry}/${img}")
                break
              fi
              echo "  not yet present, waiting 30s..."
              sleep 30
            done
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo ""
            echo "::error::One or more required images are missing on ghcr.io and/or docker.io after the deadline. GitHub Release creation is blocked until every required image is published on both registries."
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          echo ""
          echo "All required images present on ghcr.io AND docker.io for version ${VERSION}."

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE RELEASE
  # ════════════════════════════════════════════════════════════════════════════

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, release-gate, mesh-e2e-gate, verify-images-published]
    # `mesh-e2e-gate` is advisory, so this cannot fall back to the default
    # `success()` -- it has to name the gates it requires. `!cancelled()` rather
    # than `always()`: with `always()`, cancelling the run does not stop the
    # publication, because the gates it names have already reported success.
    if: |
      !cancelled() &&
      needs.build-binaries.result == 'success' &&
      needs.release-gate.result == 'success' &&
      needs.verify-images-published.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: artifact-keeper-*

      # The tag that triggered the run is the single source of the version. It
      # is the same ref the gates validated, which is the point.
      - name: Determine version
        id: version
        run: |
          set -euo pipefail
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # Repeat the existence check immediately before publication to close the
      # race between the early preflight and this job. Unlike the preflight,
      # this job's token carries `contents: write`, so this is also the check
      # that can see a draft release left over from an earlier attempt.
      - name: Refuse release creation race or rerun
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          .github/scripts/assert-release-absent.sh "$TAG"

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz*" -exec cp {} release-assets/ \;
          find artifacts -name "*.exe*" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          # Pin the release to the commit this run tested. The tag already
          # exists (it is what triggered the run), so GitHub resolves the
          # release from it and this is belt-and-braces -- but it states the
          # intent, and it is the field that would otherwise silently default to
          # the head of the default branch.
          target_commitish: ${{ github.sha }}
          name: Artifact Keeper ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: false

      - name: Notify Windows MSI build
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.WINDOWS_REPO_PAT }}
          repository: artifact-keeper/artifact-keeper-windows
          event-type: backend-release
          client-payload: '{"version": "${{ steps.version.outputs.version }}", "tag": "${{ steps.version.outputs.tag }}"}'

  # ════════════════════════════════════════════════════════════════════════════
  # NOTE: Docker images are published by .github/workflows/docker-publish.yml,
  # which already triggers on `tags: ['v*']`. We previously had a redundant
  # `docker-release` job here that re-dispatched docker-publish via
  # workflow_dispatch after the release was created. That second run
  # (a) duplicated ~30 minutes of multi-arch build work, and (b) could only
  # produce inferior tags because workflow_dispatch loses the tag context
  # required by docker/metadata-action's `type=semver` patterns. Removing it
  # leaves a single, deterministic publish path: tag push triggers
  # docker-publish.yml, which now self-verifies the published semver tags
  # before the run can succeed (see issue #905).
  # ════════════════════════════════════════════════════════════════════════════
